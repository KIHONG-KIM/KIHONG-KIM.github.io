---
layout: default
---
<article class="post">
  <header class="post-header">
    <div class="post-meta">{{ page.date | date: "%Y-%m-%d" }}</div>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.tags %}
    <div class="tags">
      {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
    </div>
    {% endif %}
  </header>
  <div class="post-content">
    {{ content }}
  </div>
  <a href="/" class="back">← 목록으로</a>
</article>
